<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест готовності до завершення ГВ</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; color: #333; }
        .question { margin-bottom: 20px; }
        .btn { display: block; width: 100%; padding: 10px; margin: 10px 0; background: #0088cc; color: white; border: none; border-radius: 8px; font-size: 16px; }
        .result { display: none; text-align: center; }
    </style>
</head>
<body>
    <div id="quiz">
        <h2 id="qTitle">Питання 1</h2>
        <div id="qText"></div>
        <button class="btn" onclick="nextQuestion(1)">Так</button>
        <button class="btn" onclick="nextQuestion(0)">Ні</button>
    </div>
    <div id="result" class="result">
        <h2>Ваш результат</h2>
        <p id="resText"></p>
        <button class="btn" onclick="tg.close()">Закрити</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        
        const questions = [
            "Дитині вже є 1.5 - 2 роки?",
            "Дитина може заснути без грудей (хоча б іноді)?",
            "Дитина їсть звичайну їжу з апетитом?",
            "Ви відчуваєте психологічну готовність завершити?"
        ];
        
        let currentQ = 0;
        let score = 0;
        
        function showQ() {
            document.getElementById('qTitle').innerText = `Питання ${currentQ + 1} з ${questions.length}`;
            document.getElementById('qText').innerText = questions[currentQ];
        }
        
        function nextQuestion(val) {
            score += val;
            currentQ++;
            if (currentQ < questions.length) {
                showQ();
            } else {
                showResult();
            }
        }
        
        function showResult() {
            document.getElementById('quiz').style.display = 'none';
            document.getElementById('result').style.display = 'block';
            let res = score >= 3 ? "Ви та малюк майже готові! Можна починати м'яке скорочення." : "Схоже, варто ще трохи почекати або діяти дуже поступово.";
            document.getElementById('resText').innerText = res;
        }
        
        showQ();
    </script>
</body>
</html>
