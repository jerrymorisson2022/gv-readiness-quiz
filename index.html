<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест готовності до завершення ГВ</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; padding: 15px; color: #333; background-color: #f0f2f5; line-height: 1.5; }
        .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); margin-bottom: 15px; }
        .tag { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; margin-bottom: 10px; text-transform: uppercase; }
        .tag-mama { background: #ffe4e6; color: #e11d48; }
        .tag-child { background: #dcfce7; color: #166534; }
        .q-num { color: #64748b; font-size: 13px; margin-bottom: 5px; }
        .q-text { font-size: 18px; font-weight: 700; color: #1e293b; margin-bottom: 12px; }
        .hint-box { background: #f8fafc; border-left: 4px solid #3b82f6; padding: 12px; font-size: 14px; color: #475569; margin-bottom: 20px; border-radius: 0 8px 8px 0; }
        .btn-group { display: grid; grid-template-columns: 1fr; gap: 8px; }
        .btn { padding: 14px; border: none; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.2s; text-align: left; display: flex; justify-content: space-between; align-items: center; }
        .btn-val { background: #ffffff; border: 2px solid #e2e8f0; color: #475569; }
        .btn-val:active { background: #f1f5f9; transform: scale(0.98); }
        .btn-primary { background: #0088cc; color: white; justify-content: center; margin-top: 10px; width: 100%; }
        .result-screen { display: none; }
        .score-badge { display: inline-block; padding: 10px 20px; background: #0088cc; color: white; border-radius: 15px; font-size: 24px; font-weight: 800; margin: 15px 0; }
        .category-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #f1f5f9; }
        .stars { color: #fbbf24; font-size: 18px; letter-spacing: 2px; }
    </style>
</head>
<body>
    <div id="quiz-container">
        <div class="card" id="qCard">
            <div id="qTag" class="tag">Мамин блок</div>
            <div id="qProgress" class="q-num">Питання 1 з 10</div>
            <div id="qText" class="q-text">Завантаження...</div>
            <div id="qHint" class="hint-box"></div>
            <div class="btn-group">
                <button class="btn btn-val" onclick="next(5)"><span>Повна готовність</span> <span>5</span></button>
                <button class="btn btn-val" onclick="next(4)"><span>Майже готові</span> <span>4</span></button>
                <button class="btn btn-val" onclick="next(3)"><span>Частково / 50-50</span> <span>3</span></button>
                <button class="btn btn-val" onclick="next(2)"><span>Рідко / Складно</span> <span>2</span></button>
                <button class="btn btn-val" onclick="next(1)"><span>Зовсім не готові</span> <span>1</span></button>
            </div>
        </div>
    </div>

    <div id="result-screen" class="result-screen">
        <div class="card" style="text-align: center;">
            <h2 style="margin:0">Ваш результат</h2>
            <div id="totalScore" class="score-badge">0 / 50</div>
            <p id="mainAdvice" style="font-weight: 600; color: #1e293b;"></p>
        </div>
        <div class="card">
            <h3 style="margin-top:0">Деталізація по блоках:</h3>
            <div id="breakdown"></div>
            <button class="btn btn-primary" onclick="window.Telegram.WebApp.close()">Закрити</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const questions = [
            // Блок Мами
            { block: 'Мама', type: 'mama', q: "Ресурс: чи є у вас внутрішній запас, щоб проходити процес змін без роздратування?", hint: "Якщо ви ледве закриваєте власні базові потреби — завершення краще відкласти. З порожньої чашки не наллєш." },
            { block: 'Мама', type: 'mama', q: "Розуміння процесу: чи знаєте ви, з чого починати і як реагувати на протест?", hint: "Без стратегії легко зробити різкий крок і злякатися. Спершу сформуйте план дій." },
            { block: 'Мама', type: 'mama', q: "Готовність до змін: чи є у вас 2–3 працюючі альтернативи втіхи без грудей?", hint: "Ідеальних умов не буде, але варто заздалегідь напрацювати способи заспокоєння." },
            { block: 'Мама', type: 'mama', q: "Моральна готовність: що ви відчуваєте, уявляючи останнє прикладання?", hint: "Якщо є сильний внутрішній спротив або провина — дайте собі час. Це нова форма близькості." },
            { block: 'Мама', type: 'mama', q: "Фізична готовність грудей: чи наповнюються вони до дискомфорту після перерви 10–12 годин?", hint: "Якщо переповнюються швидко — скорочувати потрібно дуже поступово, по одному годуванню на тиждень." },
            // Блок Дитини
            { block: 'Дитина', type: 'child', q: "Легкість відволікання: чи переключається дитина з вимоги грудей на цікаву гру чи справу?", hint: "Чи змінює вона траєкторію, якщо запропонувати щось захоплююче замість прикладання?" },
            { block: 'Дитина', type: 'child', q: "Здатність заспокоюватися: чи може дитина прийняти обійми або пісеньку замість грудей, коли засмучена?", hint: "Чи працюють інші форми втіхи: погладжування, присутність поруч, тихий голос?" },
            { block: 'Дитина', type: 'child', q: "Їжа чи прикладання: чи погоджується дитина на смачний перекус замість грудей через 2 години після їжі?", hint: "Важливо зрозуміти, чи це голод, чи потреба саме в контакті через прикладання." },
            { block: 'Дитина', type: 'child', q: "Вміння чекати: чи може дитина спокійно зачекати 5 хвилин, поки ви закінчуєте справу?", hint: "Чи розуміє вона концепцію «зачекай», чи це викликає негайну істерику?" },
            { block: 'Дитина', type: 'child', q: "Засинання без грудей: чи був успішний досвід відходу до сну через казку, погладжування чи пісеньку?", hint: "Чи вдавалося дитині заснути будь-яким іншим способом, окрім прикладання?" }
        ];

        let current = 0;
        let scores = [];

        function render() {
            const q = questions[current];
            document.getElementById('qTag').innerText = q.block + ' Блок';
            document.getElementById('qTag').className = 'tag ' + (q.type === 'mama' ? 'tag-mama' : 'tag-child');
            document.getElementById('qProgress').innerText = `Питання ${current + 1} з ${questions.length}`;
            document.getElementById('qText').innerText = q.q;
            document.getElementById('qHint').innerText = q.hint;
        }

        function next(val) {
            scores.push(val);
            current++;
            if (current < questions.length) {
                render();
            } else {
                showResult();
            }
        }

        function showResult() {
            document.getElementById('quiz-container').style.display = 'none';
            document.getElementById('result-screen').style.display = 'block';
            
            const total = scores.reduce((a, b) => a + b, 0);
            document.getElementById('totalScore').innerText = `${total} / 50`;

            let advice = "";
            if (total >= 40) advice = "Ви та малюк максимально готові до м'якого завершення!";
            else if (total >= 25) advice = "Ви на середині шляху. Можна починати готуватись і впроваджувати перші зміни.";
            else advice = "Зараз краще зосередитись на підготовці ресурсу та нових ритуалах.";
            document.getElementById('mainAdvice').innerText = advice;

            let html = "";
            questions.forEach((q, i) => {
                const s = scores[i];
                const stars = '★'.repeat(s) + '☆'.repeat(5 - s);
                html += `<div class="category-row">
                    <div style="font-size:14px; max-width:60%">${q.q.split(':')[0]}</div>
                    <div class="stars">${stars}</div>
                </div>`;
            });
            document.getElementById('breakdown').innerHTML = html;
        }

        render();
    </script>
</body>
</html>
